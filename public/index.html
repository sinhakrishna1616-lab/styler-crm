<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StylerCRM — Indian Menswear Stylist Research</title>
<meta name="description" content="StylerCRM helps you discover and track Indian menswear and male celebrity stylists. Filter by designation, search by name, and manage outreach status.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; background: linear-gradient(135deg,#FBF7FF 0%,#FFF5FB 50%,#F5F8FF 100%); min-height: 100vh; color: #1A1A2E; }

  /* Loading spinner */
  .spin-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; gap: 18px; }
  .spinner { width: 52px; height: 52px; border-radius: 50%; background: conic-gradient(from 0deg, #A78BFA, #F472B6, #FB923C, #A78BFA); animation: spin 0.9s linear infinite; mask: radial-gradient(farthest-side, transparent calc(100% - 6px), #000 0); -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 6px), #000 0); }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spin-label { font-size: 13px; font-weight: 600; color: #A78BFA; letter-spacing: 0.3px; }

  /* Card hover effect */
  .stylist-card { transition: transform 0.18s ease, box-shadow 0.18s ease; cursor: default; }
  .stylist-card:hover { transform: translateY(-3px); box-shadow: 0 8px 32px rgba(167,139,250,0.18) !important; }

  /* Source badge */
  .source-live { background: #D1FAE5; color: #065F46; }
  .source-fallback { background: #FEF3C7; color: #92400E; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #DDD6FE; border-radius: 3px; }

  /* Fade-in */
  @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
  .card-enter { animation: fadeUp 0.3s ease both; }

  /* Skeleton */
  @keyframes shimmer { 0%{background-position:-400px 0} 100%{background-position:400px 0} }
  .skeleton { background: linear-gradient(90deg,#f0ebff 25%,#e6dfff 50%,#f0ebff 75%); background-size:800px 100%; animation: shimmer 1.4s infinite; border-radius: 10px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const API = "/.netlify/functions/stylists";

const fmt = n => n >= 1e6 ? (n/1e6).toFixed(1)+"M" : n >= 1e3 ? Math.round(n/1e3)+"K" : String(n);
const initials = name => name.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
const AVATAR_COLORS = ["#D4C5FF","#FFD6E8","#C5F5E3","#FFE4CC","#C5E8FF","#FFF4C5","#E0F2FE","#FCE7F3","#FFDEE9","#E8FFE4"];

const STATUS_LIST = [
  {key:"contacted",  label:"✅ Contacted",     bg:"#D1FAE5", color:"#065F46"},
  {key:"ongoing",    label:"🔄 Ongoing",       bg:"#DBEAFE", color:"#1E40AF"},
  {key:"ghosted",    label:"👻 Ghosted",       bg:"#F3F4F6", color:"#374151"},
  {key:"rejected",   label:"❌ Rejected",      bg:"#FFE4E8", color:"#9B1C4A"},
  {key:"already_contacted", label:"📌 Already Done", bg:"#FEF3C7", color:"#92400E"},
];
const DES_FILTERS = ["All","Senior","Junior","Intern"];

/* ── Skeleton card ─────────────────────────────────────────────────────────── */
function SkeletonCard() {
  return (
    <div style={{background:"white",borderRadius:20,padding:18,border:"1.5px solid #F0E8FF",opacity:0.7}}>
      <div style={{display:"flex",gap:12,marginBottom:14}}>
        <div className="skeleton" style={{width:48,height:48,borderRadius:"50%",flexShrink:0}}/>
        <div style={{flex:1,display:"flex",flexDirection:"column",gap:8}}>
          <div className="skeleton" style={{height:14,width:"60%"}}/>
          <div className="skeleton" style={{height:11,width:"40%"}}/>
        </div>
        <div className="skeleton" style={{height:22,width:52,borderRadius:10}}/>
      </div>
      <div className="skeleton" style={{height:24,width:110,borderRadius:10,marginBottom:14}}/>
      <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:14}}>
        {[1,2,3].map(i=><div key={i} className="skeleton" style={{height:20,width:70,borderRadius:8}}/>)}
      </div>
      <div className="skeleton" style={{height:34,borderRadius:10}}/>
    </div>
  );
}

/* ── Status badge ──────────────────────────────────────────────────────────── */
function StatusBadge({id, statuses, onMark, openMenu, setOpenMenu}) {
  const menuRef = useRef(null);
  const cur = statuses[id];
  const info = STATUS_LIST.find(s=>s.key===cur);

  useEffect(()=>{
    const handler = e => {
      if (menuRef.current && !menuRef.current.contains(e.target)) {
        if (openMenu === id) setOpenMenu(null);
      }
    };
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  },[openMenu, id, setOpenMenu]);

  return (
    <div style={{position:"relative"}} ref={openMenu===id ? menuRef : null}>
      {info ? (
        <div style={{display:"flex",gap:6}}>
          <div style={{flex:1,background:info.bg,color:info.color,borderRadius:10,padding:"6px 10px",fontSize:11,fontWeight:700,textAlign:"center"}}>{info.label}</div>
          <button
            id={`status-change-${id}`}
            onClick={()=>setOpenMenu(openMenu===id?null:id)}
            style={{background:"#F0E8FF",border:"none",borderRadius:10,padding:"6px 10px",cursor:"pointer",fontSize:11,color:"#7C3AED",fontWeight:700}}
          >↓</button>
        </div>
      ) : (
        <button
          id={`status-mark-${id}`}
          onClick={()=>setOpenMenu(openMenu===id?null:id)}
          style={{width:"100%",background:"#F8F5FF",border:"1.5px dashed #C4B5FD",borderRadius:10,padding:"7px",cursor:"pointer",fontSize:12,color:"#A78BFA",fontWeight:600}}
        >+ Mark Status</button>
      )}
      {openMenu===id && (
        <div style={{position:"absolute",bottom:"calc(100% + 4px)",left:0,right:0,background:"white",borderRadius:12,boxShadow:"0 8px 32px rgba(100,50,200,0.15)",overflow:"hidden",border:"1px solid #EDE9FE",zIndex:50}}>
          {STATUS_LIST.map(s=>(
            <button
              key={s.key}
              id={`status-option-${id}-${s.key}`}
              onClick={()=>{onMark(id,s.key);setOpenMenu(null);}}
              style={{display:"block",width:"100%",padding:"9px 14px",background:cur===s.key?s.bg:"white",color:s.color,border:"none",textAlign:"left",cursor:"pointer",fontSize:12,fontWeight:600,borderBottom:"1px solid #F5F3FF"}}
            >{s.label}{cur===s.key?" ✓":""}</button>
          ))}
          {cur && (
            <button
              onClick={()=>{onMark(id,null);setOpenMenu(null);}}
              style={{display:"block",width:"100%",padding:"9px 14px",background:"white",color:"#EF4444",border:"none",textAlign:"left",cursor:"pointer",fontSize:12,fontWeight:500}}
            >🗑 Clear</button>
          )}
        </div>
      )}
    </div>
  );
}

/* ── Main App ──────────────────────────────────────────────────────────────── */
function StylerCRM() {
  const [stylists,   setStylists]   = useState([]);
  const [statuses,   setStatuses]   = useState({});
  const [loading,    setLoading]    = useState(true);
  const [refreshing, setRefreshing] = useState(false);
  const [error,      setError]      = useState(null);
  const [dataSource, setDataSource] = useState("fallback");
  const [updatedAt,  setUpdatedAt]  = useState(null);
  const [desFilter,  setDesFilter]  = useState("All");
  const [statusFilter, setStatusFilter] = useState("all");
  const [search,     setSearch]     = useState("");
  const [openMenu,   setOpenMenu]   = useState(null);

  const today = new Date().toLocaleDateString("en-IN",{weekday:"long",day:"numeric",month:"long",year:"numeric"});

  /* Fetch data from API */
  const fetchData = useCallback(async (isRefresh=false) => {
    if (isRefresh) setRefreshing(true);
    else setLoading(true);
    setError(null);
    try {
      const res = await fetch(API + "?t=" + Date.now());
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const json = await res.json();
      setStylists(json.stylists || []);
      setStatuses(json.statuses || {});
      setDataSource(json.source || "fallback");
      setUpdatedAt(json.updatedAt || null);
    } catch (e) {
      setError("Could not load stylist data. Showing cached version.");
      console.error("[StylerCRM] fetch error:", e.message);
    } finally {
      setLoading(false);
      setRefreshing(false);
    }
  }, []);

  useEffect(()=>{ fetchData(); }, [fetchData]);

  /* Mark status + persist */
  const markStatus = useCallback(async (id, key) => {
    // Optimistic update
    setStatuses(prev => {
      const next = {...prev};
      if (!key || prev[id] === key) delete next[id];
      else next[id] = key;
      return next;
    });
    try {
      await fetch(API, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({id, status: (statuses[id]===key ? null : key)}),
      });
    } catch(e) {
      console.error("[StylerCRM] status save error:", e.message);
    }
  }, [statuses]);

  /* Stats */
  const stats = {
    total:     stylists.length,
    pending:   stylists.filter(s => !statuses[s.id]).length,
    contacted: Object.values(statuses).filter(v=>v==="contacted").length,
    ongoing:   Object.values(statuses).filter(v=>v==="ongoing").length,
    ghosted:   Object.values(statuses).filter(v=>v==="ghosted").length,
    rejected:  Object.values(statuses).filter(v=>v==="rejected").length,
    already:   Object.values(statuses).filter(v=>v==="already_contacted").length,
  };

  /* Filter */
  const filtered = stylists.filter(s => {
    if (desFilter !== "All" && s.des !== desFilter) return false;
    if (statusFilter !== "all") {
      if (statusFilter === "none" && statuses[s.id]) return false;
      if (statusFilter !== "none" && statuses[s.id] !== statusFilter) return false;
    }
    if (search) {
      const q = search.toLowerCase();
      if (!s.name.toLowerCase().includes(q) && !s.handle.toLowerCase().includes(q)) return false;
    }
    return true;
  });

  /* WhatsApp export */
  const sendWhatsApp = () => {
    const d = new Date().toLocaleDateString("en-IN",{day:"numeric",month:"long",year:"numeric"});
    let msg = `✨ *StylerCRM — Daily List*\n📅 ${d}\n${"─".repeat(25)}\n\n`;
    stylists.forEach((s,i)=>{
      msg += `${i+1}. *${s.name}* · ${s.des}\n`;
      msg += `   📱 instagram.com/${s.handle}\n`;
      msg += `   👥 ${fmt(s.followers)} followers\n`;
      if (s.collabs?.length) msg += `   🎬 ${s.collabs.slice(0,3).join(" · ")}\n`;
      msg += `\n`;
    });
    window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`,"_blank");
  };

  const lastUpdate = updatedAt
    ? new Date(updatedAt).toLocaleDateString("en-IN",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"})
    : null;

  /* ── Loading screen ──────────────────────────────────────────────────────── */
  if (loading) return (
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#FBF7FF 0%,#FFF5FB 100%)",display:"flex",flexDirection:"column"}}>
      <div style={{background:"white",borderBottom:"1.5px solid #F0E8FF",padding:"14px 20px",display:"flex",alignItems:"center"}}>
        <div style={{fontWeight:900,fontSize:20,background:"linear-gradient(120deg,#A78BFA,#F472B6,#FB923C)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>✨ StylerCRM</div>
      </div>
      <div className="spin-wrap">
        <div className="spinner"/>
        <div className="spin-label">Loading today's stylists…</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(290px,1fr))",gap:14,padding:"0 20px",width:"100%",maxWidth:1200}}>
          {[1,2,3,4,5,6].map(i=><SkeletonCard key={i}/>)}
        </div>
      </div>
    </div>
  );

  /* ── Main UI ─────────────────────────────────────────────────────────────── */
  return (
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#FBF7FF 0%,#FFF5FB 50%,#F5F8FF 100%)"}}>

      {/* Header */}
      <div style={{background:"white",borderBottom:"1.5px solid #F0E8FF",padding:"14px 20px",position:"sticky",top:0,zIndex:100,display:"flex",alignItems:"center",justifyContent:"space-between",gap:8,boxShadow:"0 2px 12px rgba(167,139,250,0.07)"}}>
        <div>
          <div style={{fontWeight:900,fontSize:20,background:"linear-gradient(120deg,#A78BFA,#F472B6,#FB923C)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>✨ StylerCRM</div>
          <div style={{fontSize:11,color:"#9CA3AF",fontWeight:500}}>Indian Menswear Stylist Research Tool</div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <button
            id="btn-refresh"
            onClick={()=>fetchData(true)}
            disabled={refreshing}
            style={{background:refreshing?"#F0E8FF":"#EDE9FE",color:"#7C3AED",border:"none",borderRadius:20,padding:"8px 14px",fontSize:12,fontWeight:700,cursor:refreshing?"default":"pointer",opacity:refreshing?0.7:1,transition:"all 0.15s"}}
          >{refreshing ? "⏳ Refreshing…" : "🔄 Refresh"}</button>
          <button
            id="btn-whatsapp"
            onClick={sendWhatsApp}
            style={{background:"#22C55E",color:"white",border:"none",borderRadius:20,padding:"8px 14px",fontSize:12,fontWeight:700,cursor:"pointer"}}
          >📲 WhatsApp</button>
        </div>
      </div>

      {/* Date + source bar */}
      <div style={{padding:"10px 20px 0",display:"flex",alignItems:"center",flexWrap:"wrap",gap:10}}>
        <div style={{fontSize:13,color:"#6B7280",fontWeight:500}}>📅 {today}</div>
        <span style={{
          fontSize:10,fontWeight:700,padding:"3px 10px",borderRadius:20,
          ...(dataSource==="apify" ? {background:"#D1FAE5",color:"#065F46"} : {background:"#FEF3C7",color:"#92400E"})
        }}>
          {dataSource==="apify" ? "🟢 Live data" : "🟡 Cached demo data"}
        </span>
        {lastUpdate && <span style={{fontSize:10,color:"#9CA3AF",fontWeight:500}}>Updated {lastUpdate}</span>}
        {error && <span style={{fontSize:11,color:"#EF4444",fontWeight:500}}>⚠️ {error}</span>}
      </div>

      {/* Stats chips */}
      <div style={{padding:"12px 20px",display:"flex",gap:8,overflowX:"auto"}}>
        {[
          {label:"Total",   val:stats.total,     bg:"#EDE9FE",c:"#5B21B6",icon:"📋"},
          {label:"Pending", val:stats.pending,   bg:"#FFF7ED",c:"#C2410C",icon:"⏳"},
          {label:"Contacted",val:stats.contacted,bg:"#D1FAE5",c:"#065F46",icon:"✅"},
          {label:"Ongoing", val:stats.ongoing,   bg:"#DBEAFE",c:"#1E40AF",icon:"🔄"},
          {label:"Ghosted", val:stats.ghosted,   bg:"#F3F4F6",c:"#374151",icon:"👻"},
          {label:"Rejected",val:stats.rejected,  bg:"#FFE4E8",c:"#9B1C4A",icon:"❌"},
        ].map(s=>(
          <div key={s.label}
            id={`stat-${s.label.toLowerCase()}`}
            onClick={()=>setStatusFilter(prev => prev===s.label.toLowerCase()?"all":s.label.toLowerCase())}
            style={{background:s.bg,borderRadius:14,padding:"10px 14px",minWidth:76,textAlign:"center",flexShrink:0,cursor:"pointer",transition:"transform 0.15s",border:`2px solid ${statusFilter===s.label.toLowerCase()?s.c:"transparent"}`}}
          >
            <div style={{fontSize:16}}>{s.icon}</div>
            <div style={{fontSize:20,fontWeight:900,color:s.c,lineHeight:1.2}}>{s.val}</div>
            <div style={{fontSize:10,color:"#6B7280",fontWeight:600}}>{s.label}</div>
          </div>
        ))}
      </div>

      {/* Filters */}
      <div style={{padding:"8px 20px 12px",display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
        <input
          id="search-input"
          placeholder="🔍 Search name or handle…"
          value={search}
          onChange={e=>setSearch(e.target.value)}
          style={{border:"1.5px solid #E5E7EB",borderRadius:20,padding:"7px 14px",fontSize:13,outline:"none",width:190,background:"white",transition:"border-color 0.15s"}}
          onFocus={e=>e.target.style.borderColor="#A78BFA"}
          onBlur={e=>e.target.style.borderColor="#E5E7EB"}
        />
        {DES_FILTERS.map(d=>(
          <button
            key={d}
            id={`filter-${d.toLowerCase()}`}
            onClick={()=>setDesFilter(d)}
            style={{background:desFilter===d?"#A78BFA":"white",color:desFilter===d?"white":"#6B7280",border:"1.5px solid "+(desFilter===d?"#A78BFA":"#E5E7EB"),borderRadius:20,padding:"6px 14px",fontSize:12,fontWeight:600,cursor:"pointer",transition:"all 0.15s"}}
          >{d}</button>
        ))}
        <select
          id="status-filter"
          value={statusFilter}
          onChange={e=>setStatusFilter(e.target.value)}
          style={{border:"1.5px solid #E5E7EB",borderRadius:20,padding:"6px 12px",fontSize:12,color:"#6B7280",outline:"none",background:"white",cursor:"pointer"}}
        >
          <option value="all">All Statuses</option>
          <option value="none">No Status Yet</option>
          {STATUS_LIST.map(s=><option key={s.key} value={s.key}>{s.label}</option>)}
        </select>
        <div style={{marginLeft:"auto",fontSize:12,color:"#9CA3AF",fontWeight:600}}>{filtered.length} stylists</div>
      </div>

      {/* Cards grid */}
      <div style={{padding:"0 20px 40px",display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(290px,1fr))",gap:14}}>
        {filtered.length === 0 ? (
          <div style={{gridColumn:"1/-1",textAlign:"center",padding:"60px 20px",color:"#A78BFA",fontWeight:700,fontSize:15}}>
            No stylists match your filters 🔍
          </div>
        ) : filtered.map((s,idx)=>{
          const ac = AVATAR_COLORS[idx % AVATAR_COLORS.length];
          return (
            <div
              key={s.id}
              className="stylist-card card-enter"
              id={`card-${s.id}`}
              style={{
                background:"white",borderRadius:20,padding:18,
                boxShadow:"0 2px 16px rgba(167,139,250,0.08)",
                border:"1.5px solid #F0E8FF",
                animationDelay:`${Math.min(idx * 0.03, 0.4)}s`,
              }}
            >
              {/* Card header */}
              <div style={{display:"flex",gap:12,alignItems:"flex-start",marginBottom:12}}>
                <div style={{width:48,height:48,borderRadius:"50%",background:ac,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:900,flexShrink:0,color:"#4B5563"}}>
                  {initials(s.name)}
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:800,fontSize:14,color:"#111827",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{s.name}</div>
                  <a
                    href={`https://instagram.com/${s.handle}`}
                    target="_blank"
                    rel="noopener noreferrer"
                    id={`ig-link-${s.id}`}
                    style={{fontSize:12,color:"#A78BFA",textDecoration:"none",fontWeight:600}}
                  >@{s.handle} ↗</a>
                </div>
                <span style={{
                  background: s.des==="Senior"?"#EDE9FE": s.des==="Intern"?"#FFF3CD":"#DBEAFE",
                  color:      s.des==="Senior"?"#5B21B6": s.des==="Intern"?"#92400E":"#1E40AF",
                  borderRadius:10,padding:"3px 9px",fontSize:10,fontWeight:800,flexShrink:0,whiteSpace:"nowrap",
                }}>{s.des}</span>
              </div>

              {/* Follower count */}
              <div style={{display:"inline-flex",alignItems:"center",gap:5,background:"#FEF9C3",borderRadius:10,padding:"4px 10px",fontSize:11,fontWeight:700,color:"#854D0E",marginBottom:12}}>
                👥 {fmt(s.followers)} followers
              </div>

              {/* Celeb collabs */}
              {s.collabs && s.collabs.length > 0 && (
                <div style={{marginBottom:14}}>
                  <div style={{fontSize:10,fontWeight:700,color:"#9CA3AF",letterSpacing:0.5,marginBottom:5}}>🎬 CELEB COLLABS</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                    {s.collabs.map((c,ci)=>(
                      <span key={ci} style={{background:"#FFF0F7",border:"1px solid #FCE7F3",borderRadius:8,padding:"2px 8px",fontSize:10,color:"#6B7280",fontWeight:500}}>{c}</span>
                    ))}
                  </div>
                </div>
              )}

              {/* Status badge */}
              <StatusBadge
                id={s.id}
                statuses={statuses}
                onMark={markStatus}
                openMenu={openMenu}
                setOpenMenu={setOpenMenu}
              />
            </div>
          );
        })}
      </div>

      {/* Footer */}
      <div style={{textAlign:"center",padding:"0 20px 24px",fontSize:11,color:"#C4B5FD",fontWeight:500}}>
        StylerCRM · Data refreshed daily at 8:00 AM IST · {stylists.length} stylists today
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<StylerCRM />);
</script>
</body>
</html>
